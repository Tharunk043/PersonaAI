services:
  - type: web
    name: persona-ai-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: PORT
        value: 8787
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HEYGEN_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
